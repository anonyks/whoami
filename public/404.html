<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages
      var path = window.location.pathname;
      var repo = '/whoami';
      if (path.startsWith(repo)) {
        window.location.replace(repo + '/?p=' + encodeURIComponent(path.slice(repo.length)));
      }
    </script>
  </head>
  <body></body>
</html>
